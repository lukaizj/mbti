interface:
  display_name: MBTI
  short_description: >-
    MBTI 16-type persona work modes for agent tone and behavior. Use when the user
    specifies a type, asks for persona/work mode, or wants personality-driven collaboration.
  default_prompt: >-
    Activate mbti skill. Ask for MBTI type if not given, then load
    references/personas/{TYPE}.md and behavior-contract.md before starting the task.
